name: "🚀 VO-SE Cut Studio: Absolute Professional Build"

on:
  push:
    branches: [ main ]
    tags: [ 'v*' ]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  check-and-build:
    name: 💎 Quality Gate & Build (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: true 
      matrix:
        os: [windows-latest, macos-latest]

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Setup Advanced Python Environment
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'
          cache: 'pip'
          cache-dependency-path: '**/requirements.txt'


      - name: Install System Dependencies (macOS)
        if: matrix.os == 'macos-latest'
        run: brew install libsndfile

      - name: Install System Dependencies (Windows)
        if: matrix.os == 'windows-latest'
        run: |
          # SoundFileの依存関係は通常pipで入るが、
          # DLLのロードに失敗する場合は、MSVC再配布可能パッケージ等の確認が必要

      - name: Install Hardened Dependencies
        shell: bash
        run: |
          python -m pip install --upgrade pip wheel setuptools
          for i in {1..3}; do
            pip install -r requirements.txt && break || sleep 5
          done

      - name: 🛡️ Strict Linting & Auto-Fix (Ruff)
        shell: bash
        run: |
          # 1. 自動修正を適用
          ruff check . --select E,F,W,I --fix
          ruff format .
          
          # 2. 修正後の状態を確認（まだ汚れがあれば、ここでエラーとして落とす）
          ruff check . --select E,F,W,I
          ruff format . --check
          

  
      - name: 🎙️ Pack Voice Assets (Generate voice_data.h)
        shell: bash
        run: |
          python modules/tools/pack_voice.py
          # 生成されたか確認（デバッグ用）
          ls -l src/core/voice_data.h
          
      - name: Debug File Structure
        shell: bash
        run: |
          echo "--- Current Directory Structure ---"
          find . -maxdepth 3 -name "*.cpp"
          
      - name: 🛠️ Native Core Compilation
        shell: bash
        run: |
          mkdir -p bin obj

          # 1. ソース・インクルード収集
          SOURCES=$(find src \( -name "*.cpp" -o -name "*.c" \) | sort)
          INCLUDES=$(find src -type d | sed 's/^/-I/' | tr '\n' ' ')
          # include/ 以下の全サブディレクトリも収集
          INCLUDE_DIRS=$(find include -type d | sed 's/^/-I/' | tr '\n' ' ')

          echo "--- 🔍 Debug Check ---"
          SRC_COUNT=$(echo "$SOURCES" | grep -c '.')
          echo "Found $SRC_COUNT source files."

          if [ "$SRC_COUNT" -le 1 ]; then
            echo "❌ CRITICAL ERROR: Engine files not found in src/"
            ls -R src; exit 1
          fi

          # 2. OS別フラグ設定
          if [ "${{ matrix.os }}" = "windows-latest" ]; then
            CXX_CMD="g++"
            EXTRA_FLAGS="-mavx2 -static -static-libgcc -static-libstdc++"
            OUT="bin/libvo_se_cut.dll"
            LINK_FLAGS="-shared"
          else
            CXX_CMD="clang++"
            EXTRA_FLAGS="-undefined dynamic_lookup"
            OUT="bin/libvo_se_cut.dylib"
            LINK_FLAGS="-dynamiclib"
          fi

          # 3. 個別コンパイル
          printf '%s\n' "$SOURCES" | while IFS= read -r SRC; do
            [ -z "$SRC" ] && continue
            OBJ="obj/$(echo "$SRC" | tr '/' '_' | tr ' ' '_').o"
            DIR=$(dirname "$SRC")

            echo "🔨 Compiling: $SRC"
            $CXX_CMD -std=c++17 -fPIC -c "$SRC" \
              -I"$DIR" \
              $INCLUDES \
              $INCLUDE_DIRS \
              -O3 -w \
              -o "$OBJ"

            if [ $? -ne 0 ]; then
              echo "❌ Failed: $SRC"
              exit 1
            fi
          done || { echo "❌ Compile error. Aborting."; exit 1; }

          # 4. リンク
          echo "🔗 Linking → $OUT"
          $CXX_CMD -std=c++17 $LINK_FLAGS \
            -o "$OUT" \
            obj/*.o \
            $EXTRA_FLAGS \
            -O3 -w

          echo "✅ Build complete: $OUT"
          
      - name: 🛠️ Native Core Compilation (Recursive & Flattened)
        shell: bash
        run: |
          mkdir -p bin obj

          # 1. すべてのソースファイルを再帰的に取得
          SOURCES=$(find src -name "*.cpp" -o -name "*.c")
          
          # 2. すべてのディレクトリをインクルードパスに追加し、'tr' で改行をスペースに変換
          # これにより、すべてのパスが一行の引数としてコンパイラに正しく渡されます
          ALL_INC_DIRS=$(find src include -type d | sed 's/^/-I /' | tr '\n' ' ')
          
          echo "--- 🔍 Compiling following sources ---"
          echo "$SOURCES"
          echo "--- 📂 Flattened Include Paths ---"
          echo "$ALL_INC_DIRS"

          if [ "${{ matrix.os }}" = "macos-latest" ]; then
            clang++ -std=c++17 -shared -fPIC \
              $SOURCES \
              $ALL_INC_DIRS \
              -O3 -o bin/libvo_se_cut.dylib \
              -framework Foundation
          else
            # Windows (MinGW)
            g++ -std=c++17 -shared -fPIC \
              $SOURCES \
              $ALL_INC_DIRS \
              -O3 -o bin/libvo_se_cut.dll \
              -Wl,--out-implib,bin/libvo_se_cut.a
          fi

      # --- 4. パッケージング (PyInstaller) ---
      - name: 📦 Final Packaging
        shell: bash
        run: |
          mkdir -p dist_out
          if [ "${{ matrix.os }}" = "windows-latest" ]; then
            pyinstaller --noconsole --onefile --clean \
              --add-data "bin/libvo_se_cut.dll;bin" \
              --name "VO-SE_Cut_Studio_Win" modules/gui/main_window.py  # ← パス修正
            mv dist/VO-SE_Cut_Studio_Win.exe dist_out/
          else
            pyinstaller --noconsole --windowed --clean \
              --add-data "bin/libvo_se_cut.dylib:bin" \
              --name "VO-SE_Cut_Studio_Mac" modules/gui/main_window.py  # ← パス修正
            codesign --force --deep --sign - "dist/VO-SE_Cut_Studio_Mac.app"
            cd dist && zip -ry ../dist_out/VO-SE_Cut_Studio_Mac.zip VO-SE_Cut_Studio_Mac.app && cd ..
          fi

      - name: Upload Build Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: Release-${{ matrix.os }}
          path: dist_out/

  release:
    name: 🌍 Global Distribution
    needs: check-and-build
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/v')
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: final_assets
          merge-multiple: true

      - name: Create Official Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            final_assets/*.exe
            final_assets/*.zip
          body: |
            ## VO-SE Cut Studio Official Release
            - Automated Type & Lint Checks: PASSED
            - Native Core Integration: VERIFIED
            - Cross-Platform Build: SUCCESS
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
