name: "🚀 VO-SE Cut Studio: Absolute Professional Build"

on:
  push:
    branches: [ main ]
    tags: [ 'v*' ]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  check-and-build:
    name: 💎 Quality Gate & Build (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: true 
      matrix:
        os: [windows-latest, macos-latest]

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Setup Advanced Python Environment
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'
          cache: 'pip'
          cache-dependency-path: '**/requirements.txt'

      - name: Install System Dependencies (macOS)
        if: matrix.os == 'macos-latest'
        run: brew install libsndfile

      - name: Install Hardened Dependencies
        shell: bash
        run: |
          python -m pip install --upgrade pip wheel setuptools
          for i in {1..3}; do
            pip install -r requirements.txt && break || sleep 5
          done

      - name: 🛡️ Strict Linting & Auto-Fix (Ruff)
        shell: bash
        run: |
          ruff check . --select E,F,W,I --fix
          ruff format .
          ruff check . --select E,F,W,I
          ruff format . --check

      - name: Type Check with Pyright
        run: pyright .
          
      - name: 🎙️ Pack Voice Assets
        shell: bash
        run: |
          python modules/tools/pack_voice.py
          ls -l src/core/voice_data.h
      - name: 🛠️ Native Core Compilation (Unified Build)
        shell: bash
        run: |
          mkdir -p bin
          SOURCES=$(find src -type f \( -name "*.cpp" -o -name "*.c" -o -name "*.cc" \))
          # インクルードパスの設定
          ALL_INC_DIRS="-I sdk/ffmpeg/include $(find src include -type d | sed 's/^/-I /' | tr '\n' ' ')"
          
          echo "--- 🔍 Found Sources ---"
          echo "$SOURCES"

          if [ "${{ matrix.os }}" = "macos-latest" ]; then
            # macOS: ライブラリパス (-L) と 各ライブラリ (-l) を指定
            clang++ -std=c++17 -shared -fPIC \
              $SOURCES \
              $ALL_INC_DIRS \
              -Lsdk/ffmpeg/macos_arm64 \
              -lavformat -lavcodec -lavutil -lswscale -lswresample \
              -O3 -o bin/libvo_se_cut.dylib \
              -framework Foundation
          else
            # Windows: ライブラリパス (-L) と 各ライブラリ (-l) を指定
            g++ -std=c++17 -shared -fPIC \
              $SOURCES \
              $ALL_INC_DIRS \
              -Lsdk/ffmpeg/win_x64 \
              -lavformat -lavcodec -lavutil -lswscale -lswresample \
              -O3 -o bin/libvo_se_cut.dll \
              -Wl,--out-implib,bin/libvo_se_cut.a
          fi

      - name: 📦 Final Packaging (PyInstaller)
        shell: bash
        run: |
          mkdir -p dist_out
          if [ "${{ matrix.os }}" = "windows-latest" ]; then
            pyinstaller --noconsole --onefile --clean \
              --add-data "bin/libvo_se_cut.dll;bin" \
              --name "VO-SE_Cut_Studio_Win" modules/gui/main_window.py
            mv dist/VO-SE_Cut_Studio_Win.exe dist_out/
          else
            pyinstaller --noconsole --windowed --clean \
              --add-data "bin/libvo_se_cut.dylib:bin" \
              --name "VO-SE_Cut_Studio_Mac" modules/gui/main_window.py
            codesign --force --deep --sign - "dist/VO-SE_Cut_Studio_Mac.app"
            cd dist && zip -ry ../dist_out/VO-SE_Cut_Studio_Mac.zip VO-SE_Cut_Studio_Mac.app && cd ..
          fi

      - name: Upload Build Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: Release-${{ matrix.os }}
          path: dist_out/

  release:
    name: 🌎 Global Distribution
    needs: check-and-build
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/v')
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: final_assets
          merge-multiple: true

      - name: Create Official Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            final_assets/*.exe
            final_assets/*.zip
          body: |
            ## VO-SE Cut Studio Official Release
            - Automated Type & Lint Checks: **PASSED**
            - Native Core Integration: **VERIFIED**
            - Cross-Platform Build: **SUCCESS**
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
