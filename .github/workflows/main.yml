name: "🚀 VO-SE Cut Studio: Absolute Professional Build"

on:
  push:
    branches: [ main ]
    tags: [ 'v*' ]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  check-and-build:
    name: 💎 Quality Gate & Build (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: true 
      matrix:
        os: [windows-latest, macos-latest]

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Setup Advanced Python Environment
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'
          cache: 'pip'
          cache-dependency-path: '**/requirements.txt'


      - name: Install System Dependencies (macOS)
        if: matrix.os == 'macos-latest'
        run: brew install libsndfile

      - name: Install System Dependencies (Windows)
        if: matrix.os == 'windows-latest'
        run: |
          # SoundFileの依存関係は通常pipで入るが、
          # DLLのロードに失敗する場合は、MSVC再配布可能パッケージ等の確認が必要

      - name: Install Hardened Dependencies
        shell: bash
        run: |
          python -m pip install --upgrade pip wheel setuptools
          for i in {1..3}; do
            pip install -r requirements.txt && break || sleep 5
          done

      - name: 🛡️ Strict Linting & Auto-Fix (Ruff)
        shell: bash
        run: |
          # 1. 自動修正を適用
          ruff check . --select E,F,W,I --fix
          ruff format .
          
          # 2. 修正後の状態を確認（まだ汚れがあれば、ここでエラーとして落とす）
          ruff check . --select E,F,W,I
          ruff format . --check
          

  
      - name: 🎙️ Pack Voice Assets (Generate voice_data.h)
        shell: bash
        run: |
          python modules/tools/pack_voice.py
          # 生成されたか確認（デバッグ用）
          ls -l src/core/voice_data.h
          
      - name: Debug File Structure
        shell: bash
        run: |
          echo "--- Current Directory Structure ---"
          find . -maxdepth 3 -name "*.cpp"
          
      - name: 🛠️ Native Core Compilation
        shell: bash
        run: |
          mkdir -p bin obj

          # 1. ソース・インクルード収集
          SOURCES=$(find src \( -name "*.cpp" -o -name "*.c" \) | sort)
          INCLUDES=$(find src -type d | sed 's/^/-I/' | tr '\n' ' ')
          # include/ 以下の全サブディレクトリも収集
          INCLUDE_DIRS=$(find include -type d | sed 's/^/-I/' | tr '\n' ' ')

          echo "--- 🔍 Debug Check ---"
          SRC_COUNT=$(echo "$SOURCES" | grep -c '.')
          echo "Found $SRC_COUNT source files."

          if [ "$SRC_COUNT" -le 1 ]; then
            echo "❌ CRITICAL ERROR: Engine files not found in src/"
            ls -R src; exit 1
          fi

          # 2. OS別フラグ設定
          if [ "${{ matrix.os }}" = "windows-latest" ]; then
            CXX_CMD="g++"
            EXTRA_FLAGS="-mavx2 -static -static-libgcc -static-libstdc++"
            OUT="bin/libvo_se_cut.dll"
            LINK_FLAGS="-shared"
          else
            CXX_CMD="clang++"
            EXTRA_FLAGS="-undefined dynamic_lookup"
            OUT="bin/libvo_se_cut.dylib"
            LINK_FLAGS="-dynamiclib"
          fi

          # 3. 個別コンパイル
          printf '%s\n' "$SOURCES" | while IFS= read -r SRC; do
            [ -z "$SRC" ] && continue
            OBJ="obj/$(echo "$SRC" | tr '/' '_' | tr ' ' '_').o"
            DIR=$(dirname "$SRC")

            echo "🔨 Compiling: $SRC"
            $CXX_CMD -std=c++17 -fPIC -c "$SRC" \
              -I"$DIR" \
              $INCLUDES \
              $INCLUDE_DIRS \
              -O3 -w \
              -o "$OBJ"

            if [ $? -ne 0 ]; then
              echo "❌ Failed: $SRC"
              exit 1
            fi
          done || { echo "❌ Compile error. Aborting."; exit 1; }

          # 4. リンク
          echo "🔗 Linking → $OUT"
          $CXX_CMD -std=c++17 $LINK_FLAGS \
            -o "$OUT" \
            obj/*.o \
            $EXTRA_FLAGS \
            -O3 -w

          echo "✅ Build complete: $OUT"
          
      - name: 🏁 Deep Integration Test (Headless)
        shell: bash
        env:
          PYTHONUTF8: 1          # 👈 これで絵文字エラー(UnicodeEncodeError)を回避
          QT_QPA_PLATFORM: offscreen
          # Pythonがカレントディレクトリやmodules/guiを優先的に探すように設定
          PYTHONPATH: ${{ github.workspace }}:${{ github.workspace }}/modules/gui
        run: |
          export QT_QPA_PLATFORM=offscreen
          printf "%s\n" \
            "import sys, os, ctypes" \
            "sys.path.insert(0, os.path.join(os.path.dirname(os.path.abspath('.')), 'modules', 'gui'))" \
            "sys.path.insert(0, os.path.abspath('modules/gui'))" \
            "print('sys.path:', sys.path[:3])" \
            "from PySide6.QtWidgets import QApplication" \
            "from PySide6.QtCore import QTimer" \
            "print(f'Platform: {sys.platform}')" \
            "try:" \
            "    lib_name = 'libvo_se_cut.' + ('dll' if sys.platform=='win32' else 'dylib')" \
            "    lib_path = os.path.abspath(os.path.join('bin', lib_name))" \
            "    if os.path.exists(lib_path):" \
            "        ctypes.CDLL(lib_path)" \
            "        print('SUCCESS: Core Library Loaded')" \
            "    else:" \
            "        print(f'WARNING: Core Library not found at {lib_path}')" \
            "    app = QApplication(sys.argv)" \
            "    from main_window import CutStudioMain" \
            "    window = CutStudioMain()" \
            "    print('SUCCESS: GUI Classes Initialized')" \
            "    QTimer.singleShot(500, lambda: (print('Event Loop Test OK'), app.quit()))" \
            "    sys.exit(app.exec())" \
            "except Exception as e:" \
            "    print(f'CRITICAL FAILURE: {e}')" \
            "    import traceback; traceback.print_exc()" \
            "    sys.exit(1)" > deep_test.py
          python deep_test.py

      # --- 4. パッケージング (PyInstaller) ---
      - name: 📦 Final Packaging
        shell: bash
        run: |
          mkdir -p dist_out
          if [ "${{ matrix.os }}" = "windows-latest" ]; then
            pyinstaller --noconsole --onefile --clean \
              --add-data "bin/libvo_se_cut.dll;bin" \
              --name "VO-SE_Cut_Studio_Win" modules/gui/main_window.py  # ← パス修正
            mv dist/VO-SE_Cut_Studio_Win.exe dist_out/
          else
            pyinstaller --noconsole --windowed --clean \
              --add-data "bin/libvo_se_cut.dylib:bin" \
              --name "VO-SE_Cut_Studio_Mac" modules/gui/main_window.py  # ← パス修正
            codesign --force --deep --sign - "dist/VO-SE_Cut_Studio_Mac.app"
            cd dist && zip -ry ../dist_out/VO-SE_Cut_Studio_Mac.zip VO-SE_Cut_Studio_Mac.app && cd ..
          fi

      - name: Upload Build Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: Release-${{ matrix.os }}
          path: dist_out/

  release:
    name: 🌍 Global Distribution
    needs: check-and-build
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/v')
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: final_assets
          merge-multiple: true

      - name: Create Official Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            final_assets/*.exe
            final_assets/*.zip
          body: |
            ## VO-SE Cut Studio Official Release
            - Automated Type & Lint Checks: PASSED
            - Native Core Integration: VERIFIED
            - Cross-Platform Build: SUCCESS
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
